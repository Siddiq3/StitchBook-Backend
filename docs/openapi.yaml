  # ══════════════════════════════════════════════════════
  # UPLOAD — 1 endpoint
  # ══════════════════════════════════════════════════════

  /upload:
    post:
      tags: [Upload]
      summary: Upload image file — with security validation
      description: |
        **Upload image for:**
        - Cloth photos
        - Measurement reference
        - Portfolio showcase
        - Customer/staff photos
        
        **Security Features:**
        - Max file size: **10 MB**
        - Allowed MIME types: jpeg, png, gif, webp
        - Automatic virus/malware scanning
        - Rate limited to prevent abuse
        - Files stored with timestamp prefix for uniqueness
        - Returns public URL for later reference
        
        **File Processing:**
        - Original filename preserved in URL generation
        - Duplicate uploads generate unique filenames
        - Storage: /uploads directory on server
        - Public access via /uploads/* endpoint
        
        **Response contains:**
        - `url`: Public URL to use in order cloth_images or portfolio
        - `filename`: Server-generated unique filename
        - `size`: Actual file size in bytes
        - `mimeType`: Detected MIME type
      operationId: uploadImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: |
                    Image file (jpg, jpeg, png, gif, or webp)
                    Max size: 10MB
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              example:
                success: true
                message: File uploaded successfully
                data:
                  url: "http://localhost:5002/uploads/1715342400000_cloth_photo.jpg"
                  filename: "1715342400000_cloth_photo.jpg"
                  size: 245678
                  mimeType: "image/jpeg"
        '400':
          description: Invalid file or missing
          content:
            application/json:
              examples:
                noFile:
                  summary: No file provided
                  value:
                    success: false
                    message: No image file provided
                    error:
                      code: INVALID_INPUT
                invalidFormat:
                  summary: Invalid file type
                  value:
                    success: false
                    message: Only jpg, jpeg, png, gif, webp files are allowed
                    error:
                      code: INVALID_INPUT
                fileTooLarge:
                  summary: File exceeds size limit
                  value:
                    success: false
                    message: File size exceeds 10MB limit
                    error:
                      code: INVALID_INPUT
                      details:
                        maxSize: "10485760"
                        actualSize: 15728640
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'

