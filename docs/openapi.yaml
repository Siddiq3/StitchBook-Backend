  /payment:
    post:
      tags: [Payment]
      summary: Record payment for an order
      description: Auto-recalculates order balance_due after recording. Also logs activity.
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, amount]
              properties:
                orderId:
                  type: integer
                amount:
                  type: number
                paymentMethod:
                  type: string
                  enum: [cash, card, upi, bank_transfer, check, other]
                  default: cash
                paymentDate:
                  type: string
                  format: date
                notes:
                  type: string
            example:
              orderId: 1
              amount: 500.00
              paymentMethod: "upi"
              paymentDate: "2026-04-29"
              notes: "Advance payment via GPay"
      responses:
        '201':
          description: Payment recorded successfully
          content:
            application/json:
              example:
                success: true
                message: Payment recorded successfully
                data:
                  id: 1
                  orderId: 1
                  shopId: 1
                  amount: 500.00
                  paymentMethod: "upi"
                  paymentDate: "2026-04-29"
                  notes: "Advance payment via GPay"
                  createdAt: "2026-04-29T10:00:00Z"
                  orderUpdated:
                    totalAmount: 1800.00
                    advancePaid: 500.00
                    balanceDue: 1300.00

